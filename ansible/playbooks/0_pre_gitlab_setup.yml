---
- name: Install and configure New Server
  hosts: gitlab_vps
  become: yes
  gather_facts: yes
  vars_files:
      - /app/inventory/group_vars/new-gitlab-vps.yaml

  tasks:
    - name: Ensure the system is Debian-based
      debug:
        msg: "This host is {{ ansible_facts['distribution'] }}"
      when: ansible_facts.os_family == "Debian"

    - name: Update package lists
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600  # Cache is valid for 1 hour
      when: ansible_facts.os_family == "Debian"

    - name: Create sudo user
      ansible.builtin.user:
        name: "{{ new_username }}"
        state: present
        shell: /bin/bash
        groups: sudo
        append: yes
        create_home: yes
        password: "{{ vault_user_password | password_hash('sha512') }}"
    
    - name: Set authorized key for remote user
      ansible.posix.authorized_key:
        user: "{{ new_username }}"
        state: present
        key: "{{ lookup('file', lookup('env','HOME') + '/.ssh/id_ed25519.pub') }}"

    - name: Fix SSH permissions
      file:
        path: /home/{{ new_username }}/.ssh
        state: directory
        owner: "{{ new_username }}"
        group: "{{ new_username }}"
        mode: "0700"

    - name: Fix authorized_keys permissions
      ansible.builtin.file:
        path: "/home/{{ new_username }}/.ssh/authorized_keys"
        owner: "{{ new_username }}"
        group: "{{ new_username }}"
        mode: "0600"

    # 1. Install UFW
    - name: Install UFW
      ansible.builtin.apt:
        name: ufw
        state: present
        update_cache: yes
      when: ansible_facts.os_family == "Debian"

    - name: Allow SSH VPS
      community.general.ufw:
        rule: allow
        port: "22"
        proto: tcp

    - name: Allow GitLab SSH 
      community.general.ufw:
        rule: allow
        port: "2222"
        proto: tcp

    - name: Allow HTTP
      community.general.ufw:
        rule: allow
        port: "80"
        proto: tcp

    - name: Allow HTTPS
      community.general.ufw:
        rule: allow
        port: "443"
        proto: tcp


    # 4. Enable and Set default firewall policy
    - name: Set UFW default policy
      community.general.ufw:
        state: enabled
        policy: deny

    # 5. Reload UFW to ensure rules applied
    - name: Reload UFW
      community.general.ufw:
        state: reloaded

    - name: Disable root login
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin no'

    - name: Disable password authentication
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication no'


    - name: Enable public key authentication
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PubkeyAuthentication'
        line: 'PubkeyAuthentication yes'


    - name: Restrict SSH users
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?AllowUsers'
        line: 'AllowUsers {{ new_username }}'

    - name: Lock root user
      ansible.builtin.user:
        name: root
        password_lock: yes

    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart SSH socket
      ansible.builtin.service:
        name: ssh.socket
        state: restarted

    - name: Restart SSH service
      ansible.builtin.service:
        name: ssh
        state: restarted


