# ansible\playbooks\phase-2.yml
---
- name: Phase 2 – Install Cilium CNI on Kubernetes Cluster with Helm
  # hosts: all
  hosts: control_plane          # ← فقط روی master/control-plane
  become: false   # False bayad bashe chon helm va kubectl ba user normal ejra mishe
  # vars_files:
  #     - /app/inventory/group_vars/all.yml
  roles:
    - helm
    - cilium

# Fast syntax check only
# ansible-playbook -i /app/inventory/contabo.yml /app/playbooks/phase-2.yml --ask-become-pass --syntax-check

# If syntax ok → try a dry run
# ansible-playbook -i /app/inventory/contabo.yml /app/playbooks/phase-2.yml --ask-become-pass --check --diff

# If everything looks good → real run
# ansible-playbook -i /app/inventory/contabo.yml /app/playbooks/phase-2.yml --ask-become-pass



# Cilium installation reminder:

# You only run Helm once on the control-plane/master node.
# The Cilium DaemonSet automatically creates one agent pod on every node in the cluster (master + all workers).
# Kubernetes scheduler does this job — no need to run Helm on workers.
# That's why Helm on workers fails (no admin kubeconfig) but it's harmless — agents are already running on them.

# Short version to memorize:
# "Helm → only on master
# DaemonSet → agents on every node automatically"