- name: Install containerd dependencies
  ansible.builtin.apt:
    name:
      - curl
      - gnupg2
      - software-properties-common
    state: present
    update_cache: yes
  become: true

- name: Install containerd
  ansible.builtin.apt:
    name: containerd
    state: present
    update_cache: yes
  become: true

- name: Configure containerd default
  ansible.builtin.command: containerd config default > /etc/containerd/config.toml
  args:
    creates: /etc/containerd/config.toml
  become: true

- name: Restart containerd
  ansible.builtin.service:
    name: containerd
    state: restarted
    enabled: true
  become: true
