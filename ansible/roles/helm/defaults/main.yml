# ansible\roles\helm\defaults\main.yml
---
# defaults file for role: helm

# آیا Helm را نصب کنیم یا خیر (برای کنترل conditional)
helm_install: true

# روش نصب (در حال حاضر فقط apt پشتیبانی شده، می‌تونی بعداً اضافه کنی: script, binary, ...)
helm_install_method: apt

# متغیرهای مربوط به روش apt (از مخزن Buildkite)
helm_apt_key_url: "https://packages.buildkite.com/helm-linux/helm-debian/gpgkey"
helm_apt_key_path: "/usr/share/keyrings/helm.gpg"
helm_apt_repo_url: "https://packages.buildkite.com/helm-linux/helm-debian/any/"
helm_apt_repo_suite: "any"
helm_apt_repo_component: "main"
helm_apt_repo_filename: "helm-stable-debian"

# محتوای خط repo (با signed-by برای امنیت بیشتر)
helm_apt_repo_line: >-
  deb [signed-by={{ helm_apt_key_path }}] {{ helm_apt_repo_url }} {{ helm_apt_repo_suite }} {{ helm_apt_repo_component }}

# پیش‌نیازهای apt
helm_apt_prerequisites:
  - curl
  - gpg
  - apt-transport-https

# آیا بعد از نصب نسخه Helm را چک کنیم؟
helm_verify_version: true