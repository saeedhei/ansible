# ansible\roles\ufw-kubernetes\tasks\main.yml
---
- name: Install ufw if not present
  ansible.builtin.apt:
    name: ufw
    state: present
    update_cache: yes
  become: true

- name: Reset ufw completely if requested (فقط وقتی true باشه - اختیاری)
  ansible.builtin.command: ufw --force reset
  become: true
  when: ufw_reset_and_restrict | default(false) | bool
  changed_when: true
  notify: Enable ufw after reset

- name: Set default incoming policy to deny
  ansible.builtin.command: ufw default deny incoming
  become: true
  changed_when: false

- name: Allow outgoing traffic
  ansible.builtin.command: ufw default allow outgoing
  become: true
  changed_when: false

- name: جمع‌آوری IP همه نودهای کلاستر
  ansible.builtin.set_fact:
    cluster_ips: "{{ groups['all'] | map('extract', hostvars, 'ansible_host') | unique | list }}"

- name: جمع‌آوری IP نودهای control plane
  ansible.builtin.set_fact:
    control_plane_ips: "{{ groups['control_plane'] | map('extract', hostvars, 'ansible_host') | unique | list }}"

- name: Allow Kubelet API (10250) فقط از control plane روی workerها
  ansible.builtin.ufw:
    rule: allow
    port: 10250
    proto: tcp
    src: "{{ item }}"
    comment: "Kubelet API from control plane - {{ item }}"
  loop: "{{ control_plane_ips }}"
  become: true
  when: inventory_hostname in groups['workers']
  notify: Reload ufw

# Allow Pod-to-Pod traffic
- name: Allow Pod-to-Pod traffic for CNI
  ansible.builtin.command: >
    ufw route allow from {{ item.subnet }} to {{ item.subnet }} comment '{{ item.comment }}'
  loop: "{{ kubernetes_firewall_subnets }}"
  become: true
  notify: Reload ufw

- name: Allow Kubernetes firewall ports only for cluster IPs
  ansible.builtin.ufw:
    rule: allow
    port: "{{ port_item.port }}"
    proto: "{{ port_item.proto }}"
    src: "{{ ip }}"
    comment: "{{ port_item.comment }} from {{ ip }}"
  loop: "{{ cluster_ips | product(kubernetes_firewall_ports) | list }}"
  loop_control:
    loop_var: pair
  vars:
    ip: "{{ pair[0] }}"
    port_item: "{{ pair[1] }}"
  become: true
  notify: Reload ufw

- name: Allow public ports (حفظ پورت‌های فعلی)
  ansible.builtin.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
    comment: "{{ item.comment }}"
  loop: "{{ public_ports }}"
  become: true
  notify: Reload ufw

- name: فعال کردن ufw اگر خاموش باشد
  ansible.builtin.command: ufw --force enable
  become: true
  changed_when: true
  notify: Reload ufw

- name: Deny any other incoming to 6443 (امنیت اضافی)
  ansible.builtin.ufw:
    rule: deny
    port: 6443
    proto: tcp
  become: true
  notify: Reload ufw