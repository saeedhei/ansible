---
# پورت‌های پیش‌فرض Kubernetes که باید باز بشن (می‌تونی اضافه/کم کنی)
kubernetes_firewall_ports:
  - port: 6443
    proto: tcp
    comment: Kubernetes API Server - only cluster nodes

  # اگر بعداً Flannel/Calico یا دیگر CNI استفاده کردی، این‌ها رو اضافه کن
  # - port: 8472
  #   proto: udp
  #   comment: Flannel VXLAN (optional)

# پورت‌های عمومی که می‌خوای نگه داری (از الان باز هستن)
public_ports:
  - port: 2222
    proto: tcp
    comment: SSH (custom port)
  - port: 80
    proto: tcp
    comment: HTTP
  - port: 443
    proto: tcp
    comment: HTTPS

ufw_reset_and_restrict: false