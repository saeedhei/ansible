# ansible/roles/ufw-kubernetes/defaults/main.yml
---
# پورت‌های پیش‌فرض Kubernetes که باید باز بشن (می‌تونی اضافه/کم کنی)
kubernetes_firewall_ports:
  - port: 6443
    proto: tcp
    comment: Kubernetes API Server - only cluster nodes

  - port: 8472
    proto: udp
    comment: Cilium VXLAN

  - port: 4240
    proto: tcp
    comment: Cilium health

# Pod-to-Pod subnet (برای Cilium VXLAN routing)
kubernetes_firewall_subnets:
  - subnet: 10.244.0.0/16
    comment: Pod to Pod traffic

# پورت‌های عمومی که می‌خوای نگه داری (از الان باز هستن)
public_ports:
  - port: 2222
    proto: tcp
    comment: SSH (custom port)
  - port: 80
    proto: tcp
    comment: HTTP
  - port: 443
    proto: tcp
    comment: HTTPS

ufw_reset_and_restrict: false