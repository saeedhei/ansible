# ansible\roles\common\tasks\main.yml
---
# ===========================
# Common tasks for all nodes
# ===========================

- name: Ensure swap is off (runtime)
  ansible.builtin.command: swapoff -a
  become: true
  changed_when: false

- name: Disable swap permanently in fstab
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^([^#].*swap.*)$'
    replace: '# \1'
  become: true

- name: Set hostname based on inventory
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"
  become: true

- name: Update apt cache and install common packages
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - software-properties-common
      - gnupg
      - gnupg2
    state: present
    update_cache: yes
  become: true

- name: Enable bridge netfilter for kubeadm
  ansible.builtin.sysctl:
    name: net.bridge.bridge-nf-call-iptables
    value: 1
    state: present
    reload: yes
  become: true
