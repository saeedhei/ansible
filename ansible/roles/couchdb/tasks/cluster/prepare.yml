---
- name: Check CouchDB cluster setup state on all nodes
  ansible.builtin.uri:
    url: "http://{{ hostvars[item].ansible_host }}:{{ couchdb_http_port }}/_cluster_setup"
    method: GET
    user: "{{ couchdb_admin_user }}"
    password: "{{ couchdb_admin_password }}"
    force_basic_auth: true
    status_code: 200
  register: couchdb_cluster_state
  loop: "{{ groups['couchdb_nodes'] }}"
  loop_control:
    label: "{{ item }}"